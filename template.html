<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Reversal Plan — Customizable Template</title>
<style>
:root{--bd:#1B3A5C;--bm:#2E6B9E;--bl:#E8F0F8;--gn:#2D7D46;--gl:#E8F5E9;--rd:#C62828;--rl:#FDECEA;--or:#E65100;--ol:#FFF3E0;--bg:#F7F8FA;--gb:#E0E4E8;--tx:#2C3E50;--tl:#6B7C8D;--wh:#FFF;--sh:0 2px 12px rgba(0,0,0,.08);--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);line-height:1.7}
.hdr{background:linear-gradient(135deg,var(--bd),var(--bm));color:#fff;padding:24px 16px 16px;text-align:center}
.hdr h1{font-size:20px;font-weight:700}.hdr p{font-size:12px;opacity:.8}
.nav-c{background:var(--wh);border-bottom:1px solid var(--gb);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.nav{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 4px;justify-content:center}
.nav::-webkit-scrollbar{display:none}
.nt{flex-shrink:0;padding:10px 12px;font-size:12px;font-weight:600;color:var(--tl);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap}
.nt:hover{color:var(--bm)}.nt.a{color:var(--bm);border-bottom-color:var(--bm)}
.tc{display:none;padding:16px 12px 40px;max-width:820px;margin:0 auto}.tc.a{display:block}
.c{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:14px}
.c h2{font-size:16px;color:var(--bd);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--bl)}
.c h3{font-size:14px;color:var(--bm);margin:14px 0 6px}
.c p{font-size:13px;margin-bottom:8px}.c ul{padding-left:18px;margin-bottom:8px}.c li{font-size:13px;margin-bottom:5px}
.co{border-radius:var(--r);padding:14px;margin:10px 0;font-size:12px}
.cb{background:var(--bl);border-left:4px solid var(--bm)}.cg{background:var(--gl);border-left:4px solid var(--gn)}
.cr{background:var(--rl);border-left:4px solid var(--rd)}.co-o{background:var(--ol);border-left:4px solid var(--or)}
.ct{font-weight:700;margin-bottom:4px;font-size:13px}
.tw{overflow-x:auto;margin:10px 0}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bd);color:#fff;padding:8px 10px;text-align:left;font-weight:600;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--gb)}tr:hover td{background:var(--bl)}
.hl td{background:var(--gl)!important;font-weight:600}
.tg{display:inline-block;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-right:3px}
.tg-g{background:var(--gl);color:var(--gn)}.tg-b{background:var(--bl);color:var(--bm)}
.tg-o{background:var(--ol);color:var(--or)}.tg-r{background:var(--rl);color:var(--rd)}
.vd{background:linear-gradient(135deg,var(--bd),var(--bm));color:#fff;border-radius:var(--r);padding:16px;margin:14px 0}
.vd h3{color:#fff;margin-bottom:6px;font-size:15px}.vd p{font-size:13px;opacity:.95}
.ft{text-align:center;padding:20px 16px;font-size:11px;color:var(--tl)}
@media(max-width:600px){.hdr h1{font-size:17px}.nt{padding:8px 10px;font-size:11px}.c{padding:14px}table{font-size:11px}th,td{padding:6px 8px}}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--bd);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:8px 12px;border:1px solid var(--gb);border-radius:var(--r);font-size:13px;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--bm);box-shadow:0 0 0 3px rgba(46,107,158,.15)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{padding:10px 20px;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--bm);color:#fff}.btn-primary:hover{background:var(--bd)}
.btn-secondary{background:var(--gb);color:var(--tx)}.btn-secondary:hover{background:#ccc}
.btn-danger{background:var(--rd);color:#fff}.btn-danger:hover{opacity:.8}
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px}
.checkbox-group label{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:normal;cursor:pointer}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bd);color:#fff;padding:10px 24px;border-radius:var(--r);font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="hdr">
<h1 id="hdr-title">Health Reversal Plan</h1>
<p id="hdr-sub"></p>
</div>

<div class="nav-c"><div class="nav" id="nav">
<div class="nt a" onclick="st(0,this)">Settings</div>
<div class="nt" onclick="st(1,this)">Overview</div>
<div class="nt" onclick="st(2,this)">Sleep Repair</div>
<div class="nt" onclick="st(3,this)">Diet Plan</div>
<div class="nt" onclick="st(4,this)">Exercise & Wall Sits</div>
<div class="nt" onclick="st(5,this)">Supplements & Cost</div>
<div class="nt" onclick="st(6,this)">Daily Routine</div>
<div class="nt" onclick="st(7,this)">Timeline</div>
<div class="nt" onclick="st(8,this)">Safety</div>
</div></div>

<div id="t0" class="tc a"></div>
<div id="t1" class="tc"></div>
<div id="t2" class="tc"></div>
<div id="t3" class="tc"></div>
<div id="t4" class="tc"></div>
<div id="t5" class="tc"></div>
<div id="t6" class="tc"></div>
<div id="t7" class="tc"></div>
<div id="t8" class="tc"></div>

<div class="ft" id="footer"></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// DEFAULTS CONFIG
// ═══════════════════════════════════════════════════
const DEFAULTS = {
  currentWeight: 70, targetWeight: 65, heightCm: 170, age: 35, gender: 'male',
  planDurationMonths: 6,
  bedtime: '20:30', wakeTime: '05:30', actualSleepHours: '5-6',
  sleepScore: 63, bodyBattery: '40-50',
  systolicBP: 135, diastolicBP: 75,
  healthIssues: ['Triglycerides', 'Cholesterol', 'Uric Acid'],
  supplements: ['Omega-3 Fish Oil (rTG)', 'Goji Berry Tea 20g/day'],
  wearableDevice: 'Garmin',
  currency: 'NTD'
};

const ALL_HEALTH_ISSUES = ['Triglycerides', 'Cholesterol', 'Uric Acid', 'Blood Sugar', 'Fatty Liver', 'Obesity'];
const STORAGE_KEY = 'healthPlanConfig';

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let CFG = loadConfig();

function loadConfig() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved) return Object.assign({}, DEFAULTS, saved);
  } catch(e) {}
  return Object.assign({}, DEFAULTS);
}

function saveConfig() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(CFG));
}

// ═══════════════════════════════════════════════════
// DERIVED VALUES
// ═══════════════════════════════════════════════════
function derived() {
  const d = {};
  d.weightToLose = CFG.currentWeight - CFG.targetWeight;
  d.weightLossPerMonth = d.weightToLose > 0 ? (d.weightToLose / CFG.planDurationMonths) : 0;
  d.dailyCalories = Math.round(CFG.targetWeight * 26);
  d.pulsePressure = CFG.systolicBP - CFG.diastolicBP;
  if (CFG.systolicBP >= 130 && CFG.diastolicBP < 80) d.bpType = 'ISH (Isolated Systolic Hypertension)';
  else if (CFG.systolicBP >= 130 && CFG.diastolicBP >= 80) d.bpType = 'Combined Hypertension';
  else if (CFG.systolicBP < 120 && CFG.diastolicBP < 80) d.bpType = 'Normal';
  else d.bpType = 'Elevated';
  d.bmi = (CFG.currentWeight / ((CFG.heightCm/100) ** 2)).toFixed(1);
  d.targetBmi = (CFG.targetWeight / ((CFG.heightCm/100) ** 2)).toFixed(1);
  d.milestones = [];
  for (let m = 0; m <= CFG.planDurationMonths; m++) {
    d.milestones.push({
      month: m,
      weight: (CFG.currentWeight - d.weightLossPerMonth * m).toFixed(1)
    });
  }
  d.bpReductions = [
    { intervention: 'Wall sits 3x/week', min: 10, max: 13, note: 'Visible in 12 weeks; equivalent to one BP medication' },
    { intervention: 'Sodium < 1,500 mg/day', min: 5, max: 8, note: 'Sodium impacts systolic more than diastolic' },
    { intervention: 'Omega-3 ~2g/day', min: 4, max: 5, note: 'Preferentially lowers systolic' },
    { intervention: 'Sleep repair to 7+ hours', min: 3, max: 5, note: 'Reduces sympathetic overactivation' },
    { intervention: 'Weight loss of ' + d.weightToLose.toFixed(0) + ' kg', min: Math.round(d.weightToLose * 0.6), max: Math.round(d.weightToLose * 1), note: '~1 mmHg per kg lost' }
  ];
  d.totalBpMin = d.bpReductions.reduce((s, r) => s + r.min, 0);
  d.totalBpMax = d.bpReductions.reduce((s, r) => s + r.max, 0);
  d.projectedBpLow = CFG.systolicBP - d.totalBpMax;
  d.projectedBpHigh = CFG.systolicBP - d.totalBpMin;
  d.proteinMin = Math.round(d.dailyCalories * 0.15 / 4);
  d.proteinMax = Math.round(d.dailyCalories * 0.20 / 4);
  d.fatMin = Math.round(d.dailyCalories * 0.25 / 9);
  d.fatMax = Math.round(d.dailyCalories * 0.35 / 9);
  d.carbMin = Math.round(d.dailyCalories * 0.50 / 4);
  d.carbMax = Math.round(d.dailyCalories * 0.55 / 4);
  d.hasIssue = (name) => CFG.healthIssues.includes(name);
  return d;
}

// ═══════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════
function st(idx, el) {
  document.querySelectorAll('.tc').forEach(e => e.classList.remove('a'));
  document.querySelectorAll('.nt').forEach(e => e.classList.remove('a'));
  document.getElementById('t' + idx).classList.add('a');
  if (el) el.classList.add('a');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════
// RENDER: Tab 0 — Settings
// ═══════════════════════════════════════════════════
function renderSettings() {
  const issueChecks = ALL_HEALTH_ISSUES.map(h =>
    `<label><input type="checkbox" value="${h}" ${CFG.healthIssues.includes(h) ? 'checked' : ''}> ${h}</label>`
  ).join('');

  return `<div class="c">
<h2>Settings</h2>
<p>Configure your personal health data. Changes will regenerate all tabs with your values.</p>

<h3>Basic Info</h3>
<div class="form-row">
  <div class="form-group"><label>Current Weight (kg)</label><input type="number" id="s-cw" value="${CFG.currentWeight}" step="0.1"></div>
  <div class="form-group"><label>Target Weight (kg)</label><input type="number" id="s-tw" value="${CFG.targetWeight}" step="0.1"></div>
</div>
<div class="form-row">
  <div class="form-group"><label>Height (cm)</label><input type="number" id="s-ht" value="${CFG.heightCm}"></div>
  <div class="form-group"><label>Age</label><input type="number" id="s-age" value="${CFG.age}"></div>
</div>
<div class="form-row">
  <div class="form-group"><label>Gender</label>
    <select id="s-gender"><option value="male" ${CFG.gender==='male'?'selected':''}>Male</option><option value="female" ${CFG.gender==='female'?'selected':''}>Female</option></select>
  </div>
  <div class="form-group"><label>Plan Duration (months)</label><input type="number" id="s-dur" value="${CFG.planDurationMonths}" min="1" max="24"></div>
</div>

<h3>Blood Pressure</h3>
<div class="form-row">
  <div class="form-group"><label>Systolic (mmHg)</label><input type="number" id="s-sys" value="${CFG.systolicBP}"></div>
  <div class="form-group"><label>Diastolic (mmHg)</label><input type="number" id="s-dia" value="${CFG.diastolicBP}"></div>
</div>
<div class="co cb"><p><strong>Pulse Pressure:</strong> ${CFG.systolicBP - CFG.diastolicBP} mmHg (normal 30-40) | <strong>Type:</strong> ${derived().bpType}</p></div>

<h3>Sleep</h3>
<div class="form-row">
  <div class="form-group"><label>Bedtime</label><input type="time" id="s-bed" value="${CFG.bedtime}"></div>
  <div class="form-group"><label>Wake Time</label><input type="time" id="s-wake" value="${CFG.wakeTime}"></div>
</div>
<div class="form-row">
  <div class="form-group"><label>Sleep Score</label><input type="number" id="s-ss" value="${CFG.sleepScore}" min="0" max="100"></div>
  <div class="form-group"><label>Body Battery (range, e.g. 40-50)</label><input type="text" id="s-bb" value="${CFG.bodyBattery}"></div>
</div>
<div class="form-group"><label>Actual Sleep Hours (e.g. 5-6)</label><input type="text" id="s-ash" value="${CFG.actualSleepHours}"></div>

<h3>Health Issues</h3>
<div class="checkbox-group" id="s-issues">${issueChecks}</div>

<h3>Supplements (comma-separated)</h3>
<div class="form-group"><label>Current Supplements</label><input type="text" id="s-supps" value="${CFG.supplements.join(', ')}"></div>

<h3>Other</h3>
<div class="form-row">
  <div class="form-group"><label>Wearable Device</label>
    <select id="s-wear"><option value="Garmin" ${CFG.wearableDevice==='Garmin'?'selected':''}>Garmin</option><option value="Apple Watch" ${CFG.wearableDevice==='Apple Watch'?'selected':''}>Apple Watch</option><option value="None" ${CFG.wearableDevice==='None'?'selected':''}>None</option></select>
  </div>
  <div class="form-group"><label>Currency</label>
    <select id="s-cur"><option value="NTD" ${CFG.currency==='NTD'?'selected':''}>NTD</option><option value="USD" ${CFG.currency==='USD'?'selected':''}>USD</option><option value="EUR" ${CFG.currency==='EUR'?'selected':''}>EUR</option></select>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-primary" onclick="applySettings()">Save Settings</button>
  <button class="btn btn-secondary" onclick="resetDefaults()">Reset to Defaults</button>
  <button class="btn btn-secondary" onclick="exportJSON()">Export JSON</button>
  <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">Import JSON</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
</div>
</div>`;
}

function applySettings() {
  CFG.currentWeight = parseFloat(document.getElementById('s-cw').value) || DEFAULTS.currentWeight;
  CFG.targetWeight = parseFloat(document.getElementById('s-tw').value) || DEFAULTS.targetWeight;
  CFG.heightCm = parseInt(document.getElementById('s-ht').value) || DEFAULTS.heightCm;
  CFG.age = parseInt(document.getElementById('s-age').value) || DEFAULTS.age;
  CFG.gender = document.getElementById('s-gender').value;
  CFG.planDurationMonths = parseInt(document.getElementById('s-dur').value) || DEFAULTS.planDurationMonths;
  CFG.systolicBP = parseInt(document.getElementById('s-sys').value) || DEFAULTS.systolicBP;
  CFG.diastolicBP = parseInt(document.getElementById('s-dia').value) || DEFAULTS.diastolicBP;
  CFG.bedtime = document.getElementById('s-bed').value || DEFAULTS.bedtime;
  CFG.wakeTime = document.getElementById('s-wake').value || DEFAULTS.wakeTime;
  CFG.sleepScore = parseInt(document.getElementById('s-ss').value) || DEFAULTS.sleepScore;
  CFG.bodyBattery = document.getElementById('s-bb').value || DEFAULTS.bodyBattery;
  CFG.actualSleepHours = document.getElementById('s-ash').value || DEFAULTS.actualSleepHours;
  CFG.wearableDevice = document.getElementById('s-wear').value;
  CFG.currency = document.getElementById('s-cur').value;
  CFG.healthIssues = Array.from(document.querySelectorAll('#s-issues input:checked')).map(cb => cb.value);
  CFG.supplements = document.getElementById('s-supps').value.split(',').map(s => s.trim()).filter(Boolean);
  saveConfig();
  renderAll();
  toast('Settings saved and plan updated');
}

function resetDefaults() {
  if (!confirm('Reset all settings to defaults?')) return;
  localStorage.removeItem(STORAGE_KEY);
  CFG = Object.assign({}, DEFAULTS);
  renderAll();
  toast('Reset to defaults');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(CFG, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'health-plan-config.json';
  a.click();
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      CFG = Object.assign({}, DEFAULTS, data);
      saveConfig();
      renderAll();
      toast('Config imported successfully');
    } catch(err) {
      toast('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ═══════════════════════════════════════════════════
// RENDER: Tab 1 — Overview
// ═══════════════════════════════════════════════════
function renderOverview() {
  const d = derived();
  const issueList = CFG.healthIssues.length ? CFG.healthIssues.join(', ') : 'None specified';
  const suppList = CFG.supplements.length ? CFG.supplements.join(', ') : 'None';

  let bpRows = d.bpReductions.map(r =>
    `<tr><td>${r.intervention}</td><td>-${r.min} to -${r.max} mmHg</td><td>${r.note}</td></tr>`
  ).join('');

  return `<div class="c">
<h2>Personal Profile</h2>
<div class="co cb">
<p><strong>Weight:</strong> ${CFG.currentWeight} kg (target ${CFG.targetWeight} kg, lose ${d.weightToLose.toFixed(1)} kg over ${CFG.planDurationMonths} months)</p>
<p><strong>BMI:</strong> ${d.bmi} (target ${d.targetBmi}) | <strong>Height:</strong> ${CFG.heightCm} cm | <strong>Age:</strong> ${CFG.age} | <strong>Gender:</strong> ${CFG.gender}</p>
<p><strong>Bedtime:</strong> ${CFG.bedtime} | <strong>Wake:</strong> ${CFG.wakeTime}</p>
<p><strong>Actual Sleep:</strong> ${CFG.actualSleepHours} hours</p>
<p><strong>${CFG.wearableDevice} Data:</strong> Sleep Score ${CFG.sleepScore} / Body Battery waking at ${CFG.bodyBattery}</p>
<p><strong>Blood Pressure:</strong> ${d.bpType} &mdash; ${CFG.systolicBP}/${CFG.diastolicBP} mmHg, pulse pressure ${d.pulsePressure} (normal 30-40)</p>
<p><strong>Health Issues:</strong> ${issueList}</p>
<p><strong>Current Supplements:</strong> ${suppList}</p>
</div>
</div>

<div class="c">
<h2>Top Priority</h2>
<div class="co cr">
<div class="ct">Fix Sleep First, Then Address Everything Else</div>
<p>${CFG.actualSleepHours} hours of actual sleep + Body Battery only ${CFG.bodyBattery} means sleep deprivation is undermining all metabolic repair from the ground up. If sleep isn't fixed, even a perfect diet and exercise regimen will only deliver 50% of its potential.</p>
<p style="margin-top:8px"><strong>Action Priority:</strong> (1) Sleep repair + OSA screening &rarr; (2) Shift hydration earlier &rarr; (3) Wall sits &rarr; (4) Diet adjustments &rarr; (5) Supplements</p>
</div>
</div>

<div class="c">
<h2>BP-Lowering Combination (All Interventions Combined)</h2>
<p>Your elevated markers share the same metabolic root. Each intervention below stacks on top of the others:</p>
<div class="tw"><table>
<tr><th>Intervention</th><th>Est. Systolic BP Reduction</th><th>Notes</th></tr>
${bpRows}
<tr class="hl"><td>Combined Potential</td><td>-${d.totalBpMin} to -${d.totalBpMax} mmHg</td><td>${CFG.systolicBP} &rarr; ${d.projectedBpLow}-${d.projectedBpHigh} range</td></tr>
</table></div>
<p><strong>Important:</strong> Your diastolic is already ${CFG.diastolicBP}. Some BP drugs lower both systolic and diastolic, risking diastolic going too low (< 60). Lifestyle intervention first is the optimal strategy.</p>
</div>`;
}

// ═══════════════════════════════════════════════════
// RENDER: Tab 2 — Sleep Repair
// ═══════════════════════════════════════════════════
function renderSleep() {
  return `<div class="c">
<h2>Sleep Repair (Step Zero)</h2>
<h3>Current Situation</h3>
<p>Lies down at ${CFG.bedtime} &rarr; Actual sleep only ${CFG.actualSleepHours} hours.</p>
<p>Sleep Score ${CFG.sleepScore} (needs improvement); Body Battery waking value only ${CFG.bodyBattery} (normal should be &ge;75).</p>
<p><strong>Metabolic damage from ${CFG.actualSleepHours} hours of sleep:</strong> Hypertension risk increases ~3.5x; gene expression for cholesterol metabolism is suppressed; cortisol stays elevated from early waking activity, stimulating the liver to produce more triglycerides and VLDL; uric acid excretion efficiency drops under dehydration.</p>
</div>
<div class="c">
<h3>Repair Strategy: Three-Pronged Approach</h3>
<h3>A. Solve Nocturia (Upstream Problem)</h3>
<p>Goal: Delay nocturia to ${CFG.wakeTime}, then get up directly after urinating, achieving 8.5-9 hours of sleep.</p>
<ul>
<li><strong>Reduce fluid intake after 17:00</strong>, minimize soup at dinner. After 18:30, only "lip-moistening" sips.</li>
<li><strong>Elevate legs for 15-20 minutes before bed:</strong> Around ${subtractMinutes(CFG.bedtime, 30)}, lie on the bed with feet propped against the wall at 45-60 degrees. Fluid accumulated in the lower limbs during the day returns to circulation &rarr; kidneys process it before sleep &rarr; empty bladder one last time &rarr; bladder lasts several more hours.</li>
<li><strong>Always use the bathroom at ${subtractMinutes(CFG.bedtime, 30)} before bed</strong>, even without urge.</li>
</ul>
<h3>B. If You Wake Up at Night, Force Yourself Back to Sleep</h3>
<ul>
<li>Keep all lights off during bathroom trips; use a dim warm-toned nightlight aimed at the floor. No phone, no clock-checking.</li>
<li>Return to bed immediately after urinating. Do 4-7-8 breathing (inhale 4s &rarr; hold 7s &rarr; exhale 8s) for 2-3 cycles.</li>
<li><strong>Hard rule: Do not leave the bed before ${CFG.wakeTime}.</strong> Even if you can't sleep, quiet rest still provides ~50% of the recovery benefits of deep sleep.</li>
<li>If you've been lying awake for 20 minutes, you may get up for wall sits or stretching &mdash; but no computer, no phone.</li>
</ul>
<h3>C. OSA (Obstructive Sleep Apnea) Screening</h3>
<p>Risk profile: ${CFG.gender}, age ${CFG.age}, BMI ${derived().bmi}, ${CFG.systolicBP >= 130 ? 'hypertension' : 'elevated BP'}, ${CFG.healthIssues.length > 0 ? 'dyslipidemia' : ''}, nocturia, adequate sleep duration but poor recovery. OSA alone can simultaneously drive up blood pressure, triglycerides, cholesterol, and uric acid.</p>
<div class="co co-o">
<div class="ct">Immediate Action Items</div>

// UTILITY: Time helpers
// ═══════════════════════════════════════════════════
function parseTime(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function formatTime(mins) {
  while (mins < 0) mins += 1440;
  while (mins >= 1440) mins -= 1440;
  return String(Math.floor(mins / 60)).padStart(2, '0') + ':' + String(mins % 60).padStart(2, '0');
}
function addMinutes(t, n) { return formatTime(parseTime(t) + n); }
function subtractMinutes(t, n) { return formatTime(parseTime(t) - n); }
